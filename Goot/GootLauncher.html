<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goot Launcher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --md-sys-color-primary: #00AAFF;
      --md-sys-color-primary-container: rgba(0, 170, 255, 0.12);
      --md-sys-color-surface: #141618;
      --md-sys-color-surface-variant: #1a1c1e;
      --md-sys-color-surface-container-high: #1f2124;
      --md-sys-color-on-surface: #e2e2e6;
      --md-sys-color-outline: #42474e;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-background: #060809;
      --motion-standard: cubic-bezier(0.3, 0, 0.2, 1);
      --font: 'Montserrat', ui-rounded, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--md-sys-color-primary); border-radius: 10px; }

    body {
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      overflow-x: hidden;
      transition: background-color 0.4s ease;
      position: relative;
    }

    /* Ambient glow orbs — bouncing + pulsing */
    @keyframes orb1-move {
      0%   { transform: translate(0px, 0px)   scale(1); }
      20%  { transform: translate(60px, 40px)  scale(1.12); }
      45%  { transform: translate(30px, 90px)  scale(0.9); }
      65%  { transform: translate(80px, 30px)  scale(1.08); }
      80%  { transform: translate(20px, 60px)  scale(0.95); }
      100% { transform: translate(0px, 0px)   scale(1); }
    }
    @keyframes orb2-move {
      0%   { transform: translate(0px, 0px)    scale(1); }
      25%  { transform: translate(-50px, -60px) scale(1.15); }
      50%  { transform: translate(-80px, -20px) scale(0.88); }
      70%  { transform: translate(-30px, -70px) scale(1.1); }
      88%  { transform: translate(-60px, -40px) scale(0.95); }
      100% { transform: translate(0px, 0px)    scale(1); }
    }
    @keyframes orb3-move {
      0%   { transform: translate(0px, 0px)   scale(1); }
      30%  { transform: translate(40px, -50px) scale(1.2); }
      55%  { transform: translate(-30px,-30px) scale(0.85); }
      75%  { transform: translate(50px, -60px) scale(1.05); }
      100% { transform: translate(0px, 0px)   scale(1); }
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
      transition: background 0.6s ease;
      will-change: transform;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: var(--md-sys-color-primary);
      opacity: 0.13;
      top: -120px; left: -120px;
      animation: orb1-move 18s ease-in-out infinite;
    }
    .bg-blob-2 {
      width: 380px; height: 380px;
      background: var(--md-sys-color-primary);
      opacity: 0.08;
      bottom: -100px; right: -100px;
      animation: orb2-move 22s ease-in-out infinite;
    }
    .bg-blob-3 {
      width: 280px; height: 280px;
      background: var(--md-sys-color-primary);
      opacity: 0.06;
      top: 40%; left: 50%;
      margin-left: -140px;
      animation: orb3-move 26s ease-in-out infinite;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--md-sys-color-on-surface);
      border: 1.5px solid var(--md-sys-color-outline);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.7;
      transition: all 0.2s var(--motion-standard);
      width: fit-content;
      margin-bottom: 8px;
    }
    .back-btn:hover {
      opacity: 1;
      border-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-primary);
      background: var(--md-sys-color-primary-container);
      transform: translateX(-2px);
    }

    .title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, var(--md-sys-color-on-surface) 30%, var(--md-sys-color-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background 0.4s ease;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.5;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    /* ── Accent color picker (inline, top-right) ─────────────── */
    .accent-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--md-sys-color-surface-variant);
      border: 1px solid color-mix(in srgb, var(--md-sys-color-outline) 40%, transparent);
      border-radius: 100px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .accent-pill:hover {
      border-color: var(--md-sys-color-primary);
      background: var(--md-sys-color-primary-container);
    }
    .accent-pill label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.6;
      cursor: pointer;
      font-family: var(--font);
    }
    #accentColor {
      width: 20px; height: 20px;
      border: none;
      border-radius: 50%;
      padding: 0;
      background: none;
      cursor: pointer;
      overflow: hidden;
    }
    ::-webkit-color-swatch-wrapper { padding: 0; }
    ::-webkit-color-swatch { border: none; border-radius: 50%; }

    /* ── Divider ─────────────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.35;
      padding: 0 4px;
    }

    /* ── Card container ──────────────────────────────────────── */
    .card {
      background: var(--md-sys-color-surface-variant);
      border: 1px solid color-mix(in srgb, var(--md-sys-color-outline) 40%, transparent);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Launch button row ───────────────────────────────────── */
    .launch-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      background: transparent;
      border: none;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline) 25%, transparent);
      color: var(--md-sys-color-on-surface);
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.18s var(--motion-standard), color 0.18s ease;
      text-align: left;
      width: 100%;
    }
    .launch-btn:last-child {
      border-bottom: none;
    }
    .launch-btn:hover {
      background: color-mix(in srgb, var(--md-sys-color-primary) 8%, transparent);
    }
    .launch-btn:active {
      background: color-mix(in srgb, var(--md-sys-color-primary) 16%, transparent);
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Icon badge */
    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 14px;
      background: var(--md-sys-color-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }
    .launch-btn:hover .btn-icon {
      background: color-mix(in srgb, var(--md-sys-color-primary) 22%, transparent);
    }
    .btn-icon i {
      font-size: 16px;
      color: var(--md-sys-color-primary);
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }
    .btn-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      letter-spacing: -0.2px;
    }
    .btn-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0.5;
    }
    .btn-tag.latest { color: var(--md-sys-color-primary); opacity: 1; }

    .btn-arrow {
      font-size: 14px;
      opacity: 0.3;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .launch-btn:hover .btn-arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    /* ── Loading overlay (matches V4's feel) ─────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Entrance animation ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .header { animation: fadeUp 0.4s var(--motion-standard) both; }
    .card { animation: fadeUp 0.4s var(--motion-standard) 0.06s both; }
    .card.legacy { animation: fadeUp 0.4s var(--motion-standard) 0.12s both; }
    .section-label { animation: fadeUp 0.4s var(--motion-standard) 0.1s both; }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="wrapper">
    <!-- Header -->
    <div class="header">
      <button class="back-btn" onclick="goBack()">
        <i class="fa-solid fa-arrow-left" style="font-size:11px;"></i>
        MonoLauncher
      </button>
      <div class="title-row">
        <div>
          <h1>Goot</h1>
          <div class="subtitle">Choose a version to launch</div>
        </div>
        <div class="accent-pill">
          <label for="accentColor">Accent</label>
          <input type="color" id="accentColor" value="#00AAFF">
        </div>
      </div>
    </div>

    <!-- Current releases -->
    <div class="card">
      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/GootV4beta.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-rocket"></i></div>
          <div class="btn-text">
            <span class="btn-name">V4</span>
            <span class="btn-tag latest">Latest</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>

      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/gootcharts.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-chart-bar"></i></div>
          <div class="btn-text">
            <span class="btn-name">Top Songs &amp; Albums</span>
            <span class="btn-tag latest">Latest</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>
    </div>

    <!-- Legacy label -->
    <div class="section-label">Legacy Versions</div>

    <!-- Legacy releases -->
    <div class="card legacy">
      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/GootV3.9.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="btn-text">
            <span class="btn-name">V3.9</span>
            <span class="btn-tag">Legacy</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>

      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/GootV3.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="btn-text">
            <span class="btn-name">V3</span>
            <span class="btn-tag">Legacy</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>

      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/GootV2.1Player.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="btn-text">
            <span class="btn-name">V2.1</span>
            <span class="btn-tag">Legacy</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>

      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/gootv2.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="btn-text">
            <span class="btn-name">V2</span>
            <span class="btn-tag">Legacy</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>

      <button class="launch-btn" onclick="launchGame('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/Goot/GootV1NG.html?t=')">
        <div class="btn-left">
          <div class="btn-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="btn-text">
            <span class="btn-name">V1 NG</span>
            <span class="btn-tag">Legacy</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </button>
    </div>
  </div>

  <script>
    const colorPicker = document.getElementById('accentColor');

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r}, ${g}, ${b}`;
    }

    function applyTheme(hex) {
      const rgb = hexToRgb(hex);
      const root = document.documentElement.style;
      root.setProperty('--md-sys-color-primary', hex);
      root.setProperty('--md-sys-color-primary-container', `rgba(${rgb}, 0.12)`);
      // Update blobs
      document.querySelectorAll('.bg-blob').forEach(b => b.style.background = hex);
    }

    colorPicker.addEventListener('input', e => {
      requestAnimationFrame(() => applyTheme(e.target.value));
    });

    const saveColor = () => localStorage.setItem('goot-accent-dark', colorPicker.value);
    colorPicker.addEventListener('change', saveColor);
    colorPicker.addEventListener('pointerup', saveColor);

    const savedColor = localStorage.getItem('goot-accent-dark') || '#00AAFF';
    colorPicker.value = savedColor;
    applyTheme(savedColor);

    function goBack() {
      fetch('https://raw.githubusercontent.com/RalphEG/KevinNair/refs/heads/main/MonoLaunch.html?t=' + Date.now())
        .then(r => r.text())
        .then(html => { document.open(); document.write(html); document.close(); })
        .catch(() => alert('Error loading MonoLauncher.'));
    }

    function launchGame(url) {
      const newWin = window.open('about:blank', '_blank');
      if (!newWin) {
        alert('Pop-up blocked! Please allow pop-ups to launch the cloaked engine.');
        return;
      }
      newWin.document.write(`
        <style>
          *{margin:0;padding:0;box-sizing:border-box;}
          body{background:#060809;color:#e2e2e6;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Montserrat',sans-serif;gap:20px;}
          .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top:3px solid ${colorPicker.value};border-radius:50%;animation:spin 0.8s linear infinite;}
          @keyframes spin{to{transform:rotate(360deg);}}
          p{font-size:13px;opacity:0.4;font-weight:500;letter-spacing:0.5px;}
        </style>
        <div class="spinner"></div>
        <p>Initializing Goot Engine…</p>
      `);
      fetch(url + Date.now())
        .then(r => r.text())
        .then(html => { newWin.document.open(); newWin.document.write(html); newWin.document.close(); })
        .catch(() => { newWin.document.body.innerHTML = '<p style="color:#e2e2e6;padding:20px">Error loading.</p>'; });
    }
  </script>
</body>
</html>
