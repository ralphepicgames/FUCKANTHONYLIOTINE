    <script>
        function setupMouseTracking() {
            const errorCode = document.getElementById('errorCode');
            const container = document.querySelector('.container');

            document.addEventListener('mousemove', (e) => {
                const containerRect = container.getBoundingClientRect();
                const containerCenterX = containerRect.left + containerRect.width / 2;
                const containerCenterY = containerRect.top + containerRect.height / 2;

                const deltaX = e.clientX - containerCenterX;
                const deltaY = e.clientY - containerCenterY;

                const maxOffset = 15;
                const offsetX = -(deltaX / containerRect.width) * maxOffset;
                const offsetY = -(deltaY / containerRect.height) * maxOffset;

                errorCode.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });

            document.addEventListener('mouseleave', () => {
                errorCode.style.transform = 'translate(0, 0)';
            });
        }

        document.addEventListener('DOMContentLoaded', setupMouseTracking);
    </script>
